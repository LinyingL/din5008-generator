<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator für formelle Briefe - DIN 5008 (Optimiert)</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6cd6;
            --bg-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text: #333;
            --text-light: #555;
            --bg-light: #f9fafb;
            --border: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-grad);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .preview-panel {
            position: sticky;
            top: 20px;
            overflow-x: auto;
            padding: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--text-light);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--bg-grad);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: var(--bg-light);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #eef0f2;
        }

        .btn-success {
            background: #10b981;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fca5a5;
            padding: 6px 12px;
        }

        .btn-danger:hover {
            background: #fca5a5;
            color: #b91c1c;
        }

        .paragraph-item {
            background: var(--bg-light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        /* ========= DIN 5008 Layout (Display/Print) ========= */
        #preview-wrapper {
            background: #d1d5db;
            /* Darker backdrop to show page bounds */
            padding: 20px;
            display: flex;
            justify-content: center;
            border-radius: 8px;
            overflow-x: auto;
        }

        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            font-family: 'Times New Roman', Times, serif;
            font-size: 11pt;
            line-height: 1.25;
            color: black;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* Loch- und Faltmarken (Form A) nach DIN 5008 */
        .mark {
            position: absolute;
            height: 0;
            border-top: 0.5pt solid #000;
        }

        .mark-fold-1 {
            top: 105mm;
            left: 2mm;
            /* Abstand vom linken Blattrand nach DIN 5008 */
            width: 3mm;
        }

        .mark-hole {
            top: 148.5mm;
            left: 4mm;
            /* Lochmarke etwas weiter eingerückt nach DIN 5008 */
            width: 3mm;
        }

        .mark-fold-2 {
            top: 210mm;
            left: 2mm;
            /* Abstand vom linken Blattrand nach DIN 5008 */
            width: 3mm;
        }

        /* Rücksendeangabe (Absender über Adresse) */
        .window-return {
            position: absolute;
            left: 20mm;
            top: 27mm;
            width: 85mm;
            height: 17.7mm;
            /* 50.0pt */
            font-size: 8pt;
            text-decoration: underline;
            padding-top: 5mm;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Empfängeranschrift */
        .window-address {
            position: absolute;
            left: 20mm;
            top: 44.7mm;
            width: 85mm;
            height: 27.3mm;
            /* 6 lines */
            box-sizing: border-box;
        }

        .window-address p {
            margin: 0;
            padding: 0;
        }

        .window-address .company {
            font-weight: bold;
        }

        /* Informationsblock / Bezugszeichenzeile */
        .info-block {
            position: absolute;
            right: 20mm;
            top: 32mm;
            /* Form A Informationsblock usually starts here */
            width: 75mm;
            font-size: 11pt;
            text-align: right;
            line-height: 1.4;
        }

        .info-contact {
            margin-bottom: 5mm;
        }

        .info-date {
            margin-top: 5mm;
        }

        /* Briefinhalt */
        .letter-content {
            position: absolute;
            top: 98.4mm;
            /* DIN 5008 Faltmarke 1 Bereich ca. */
            left: 25mm;
            /* Fluchtlinie */
            right: 20mm;
            bottom: 20mm;
        }

        .subject {
            font-weight: bold;
            font-size: 12pt;
            margin-bottom: 24pt;
        }

        .greeting {
            margin-bottom: 12pt;
        }

        .body-text p {
            margin-bottom: 12pt;
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
            -ms-hyphens: auto;
            word-break: break-word;
        }

        .closing-section {
            margin-top: 12pt;
        }

        .closing-phrase {
            margin-bottom: 36pt;
        }

        /* Space for manual signature */

        .attachments-list {
            margin-top: 24pt;
        }

        .attachments-list .title {
            font-weight: bold;
            margin-bottom: 6pt;
        }

        .attachments-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .attachments-list li::before {
            content: "•";
            margin-right: 6pt;
        }

        /* Toast Popup */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2563eb;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media print {
            body {
                background: none;
                padding: 0;
            }

            .editor-panel {
                display: none;
            }

            .preview-panel {
                display: block;
                padding: 0;
                position: static;
                box-shadow: none;
                overflow: visible;
            }

            #preview-wrapper {
                background: none;
                padding: 0;
                display: block;
                border-radius: 0;
            }

            .a4-page {
                box-shadow: none;
                border: none;
            }

            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Editor Panel -->
        <div class="panel editor-panel">
            <h1>📄 DIN 5008 Editor</h1>
            <p class="subtitle">Sichere, standardkonforme Architektur</p>

            <form id="letterForm">
                <div class="form-section">
                    <h3 class="section-title">👤 Absender</h3>
                    <div class="form-group">
                        <input type="text" id="senderName" placeholder="Name / Firma">
                    </div>
                    <div class="form-group">
                        <input type="text" id="senderStreet" placeholder="Straße und Hausnummer">
                    </div>
                    <div class="form-group">
                        <input type="text" id="senderCity" placeholder="PLZ und Ort">
                    </div>
                    <div class="form-group">
                        <input type="text" id="senderPhone" placeholder="Telefon (Optional)">
                    </div>
                    <div class="form-group">
                        <input type="email" id="senderEmail" placeholder="E-Mail (Optional)">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">🏢 Empfänger</h3>
                    <div class="form-group">
                        <input type="text" id="companyName" placeholder="Firmenname (Optional)">
                    </div>
                    <div class="form-group">
                        <input type="text" id="department" placeholder="Abteilung / Name">
                    </div>
                    <div class="form-group">
                        <input type="text" id="recipientStreet" placeholder="Straße und Hausnummer">
                    </div>
                    <div class="form-group">
                        <input type="text" id="recipientCity" placeholder="PLZ und Ort">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">📄 Metadaten</h3>
                    <div class="form-group">
                        <input type="text" id="dateLocation" placeholder="Datum (z.B. 15. März 2026)">
                    </div>
                    <div class="form-group">
                        <input type="text" id="subject" placeholder="Betreff">
                    </div>
                    <div class="form-group">
                        <input type="text" id="greeting" value="Sehr geehrte Damen und Herren,">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">✍️ Brieftext</h3>
                    <div id="paragraphsContainer"></div>
                    <button type="button" class="btn-success" onclick="addParagraph()">➕ Absatz hinzufügen</button>
                </div>

                <div class="form-section">
                    <h3 class="section-title">📝 Schluss</h3>
                    <div class="form-group">
                        <input type="text" id="closingGreeting" value="Mit freundlichen Grüßen">
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">📎 Anlagen (Optional)</h3>
                    <div id="attachmentsContainer"></div>
                    <button type="button" class="btn-success" onclick="addAttachment()">➕ Anlage hinzufügen</button>
                </div>
            </form>

            <div class="action-buttons">
                <button class="btn-primary" onclick="window.print()">🖨️ Als PDF / Drucken</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-secondary" onclick="loadExample()">📋 Beispiel</button>
                    <button class="btn-secondary" onclick="saveToFile()">💾 Speichern</button>
                    <button class="btn-secondary" onclick="document.getElementById('fileUpload').click()">📂
                        Laden</button>
                    <input type="file" id="fileUpload" accept=".json" style="display: none;"
                        onchange="loadFromFile(event)">
                </div>
                <button class="btn-secondary" onclick="clearAll()" style="color: #ef4444;">🗑️ Zurücksetzen</button>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="panel preview-panel">
            <div id="preview-wrapper">
                <div class="a4-page" id="document-preview">
                    <!-- Falt- und Lochmarken -->
                    <div class="mark mark-fold-1"></div>
                    <div class="mark mark-hole"></div>
                    <div class="mark mark-fold-2"></div>

                    <!-- Rücksendeangabe (Fensterzeile) -->
                    <div class="window-return" id="prev-return"></div>

                    <!-- Empfängeradresse (Fenster) -->
                    <div class="window-address" id="prev-address"></div>

                    <!-- Informationsblock (Rechts) -->
                    <div class="info-block" id="prev-info"></div>

                    <!-- Briefbereich -->
                    <div class="letter-content">
                        <div class="subject" id="prev-subject"></div>
                        <div class="greeting" id="prev-greeting"></div>
                        <div class="body-text" id="prev-body"></div>
                        <div class="closing-section">
                            <div class="closing-phrase" id="prev-closing"></div>
                            <div class="signature-name" id="prev-signature"></div>
                        </div>
                        <div class="attachments-list" id="prev-attachments"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const STORAGE_KEY = 'din5008_autosave_v2';
        let state = { paragraphs: [], attachments: [] };

        // 1. Utilities: Security (XSS Escaping) & Performance (Debounce)
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // 2. Rendering Engine
        const updatePreview = debounce(() => {
            const getVal = id => escapeHTML(document.getElementById(id).value.trim());

            // Absender
            const sName = getVal('senderName');
            const sStr = getVal('senderStreet');
            const sCity = getVal('senderCity');
            const sPhone = getVal('senderPhone');
            const sEmail = getVal('senderEmail');

            // Empfänger
            const rComp = getVal('companyName');
            const rDept = getVal('department');
            const rStr = getVal('recipientStreet');
            const rCity = getVal('recipientCity');

            // Rücksendeangabe
            const returnParts = [sName, sStr, sCity].filter(Boolean);
            document.getElementById('prev-return').innerHTML = returnParts.join(' · ');

            // Anschrift
            let addrHtml = '';
            if (rComp) addrHtml += `<p class="company">${rComp}</p>`;
            if (rDept) addrHtml += `<p>${rDept}</p>`;
            if (rStr) addrHtml += `<p>${rStr}</p>`;
            if (rCity) addrHtml += `<p>${rCity}</p>`;
            document.getElementById('prev-address').innerHTML = addrHtml;

            // Informationsblock (Rechts)
            let infoHtml = '<div class="info-contact">';
            if (sName) infoHtml += `<p><strong>${sName}</strong></p>`;
            if (sPhone) infoHtml += `<p>Tel: ${sPhone}</p>`;
            if (sEmail) infoHtml += `<p>${sEmail}</p>`;
            infoHtml += '</div>';

            const dateStr = getVal('dateLocation');
            if (dateStr) infoHtml += `<div class="info-date">${dateStr}</div>`;
            document.getElementById('prev-info').innerHTML = infoHtml;

            // Betreff und Begrüßung
            document.getElementById('prev-subject').innerHTML = getVal('subject');
            document.getElementById('prev-greeting').innerHTML = getVal('greeting');

            // Textkörper
            const bodyHtml = state.paragraphs
                .filter(p => document.getElementById(`para_${p.id}`).value.trim() !== '')
                .map(p => `<p>${escapeHTML(document.getElementById(`para_${p.id}`).value)}</p>`)
                .join('');
            document.getElementById('prev-body').innerHTML = bodyHtml;

            // Schluss
            document.getElementById('prev-closing').innerHTML = getVal('closingGreeting');
            document.getElementById('prev-signature').innerHTML = sName;

            // Anlagen
            const validAtt = state.attachments.filter(a => document.getElementById(`att_${a.id}`).value.trim() !== '');
            if (validAtt.length > 0) {
                let attHtml = '<div class="title">Anlagen</div><ul>';
                validAtt.forEach(a => {
                    attHtml += `<li>${escapeHTML(document.getElementById(`att_${a.id}`).value)}</li>`;
                });
                attHtml += '</ul>';
                document.getElementById('prev-attachments').innerHTML = attHtml;
            } else {
                document.getElementById('prev-attachments').innerHTML = '';
            }

            // Sicherung in LocalStorage
            saveToMemory();
        }, 150);

        // 3. State Management (DOM sync)
        function init() {
            // Bind input listeners
            document.getElementById('letterForm').addEventListener('input', updatePreview);

            if (!loadAutoSave()) {
                addParagraph();
            }
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function addParagraph() {
            state.paragraphs.push({ id: generateId() });
            renderDynamicLists();
        }

        function removeParagraph(id) {
            state.paragraphs = state.paragraphs.filter(p => p.id !== id);
            renderDynamicLists();
            updatePreview();
        }

        function addAttachment() {
            state.attachments.push({ id: generateId() });
            renderDynamicLists();
        }

        function removeAttachment(id) {
            state.attachments = state.attachments.filter(a => a.id !== id);
            renderDynamicLists();
            updatePreview();
        }

        function renderDynamicLists() {
            // Paragraphs
            const pCont = document.getElementById('paragraphsContainer');
            pCont.innerHTML = state.paragraphs.map((p, idx) => `
                <div class="paragraph-item">
                    <div class="flex-between">
                        <span style="font-size:12px; font-weight:bold; color:#666">Absatz ${idx + 1}</span>
                        <button type="button" class="btn-danger" onclick="removeParagraph('${p.id}')">Entfernen</button>
                    </div>
                    <textarea id="para_${p.id}" placeholder="Text...">${escapeHTML(p.value || '')}</textarea>
                </div>
            `).join('');

            // Anlagen
            const aCont = document.getElementById('attachmentsContainer');
            aCont.innerHTML = state.attachments.map((a, idx) => `
                <div class="flex-between" style="gap:10px; margin-bottom:10px;">
                    <input type="text" id="att_${a.id}" placeholder="Dokumentname..." value="${escapeHTML(a.value || '')}">
                    <button type="button" class="btn-danger" onclick="removeAttachment('${a.id}')">🗑️</button>
                </div>
            `).join('');

            // Restore actual values into DOM properties to persist through innerHTML rewrites
            state.paragraphs.forEach(p => { const el = document.getElementById(`para_${p.id}`); if (el && p.value) el.value = p.value; });
            state.attachments.forEach(a => { const el = document.getElementById(`att_${a.id}`); if (el && a.value) el.value = a.value; });

            // Re-bind specific inputs
            document.querySelectorAll('#paragraphsContainer textarea, #attachmentsContainer input').forEach(el => {
                el.addEventListener('input', (e) => {
                    const idParts = e.target.id.split('_');
                    const array = idParts[0] === 'para' ? state.paragraphs : state.attachments;
                    const item = array.find(x => x.id === idParts[1]);
                    if (item) item.value = e.target.value;
                    updatePreview();
                });
            });
        }

        // 4. Data IO
        function collectData() {
            return {
                senderName: document.getElementById('senderName').value,
                senderStreet: document.getElementById('senderStreet').value,
                senderCity: document.getElementById('senderCity').value,
                senderPhone: document.getElementById('senderPhone').value,
                senderEmail: document.getElementById('senderEmail').value,
                companyName: document.getElementById('companyName').value,
                department: document.getElementById('department').value,
                recipientStreet: document.getElementById('recipientStreet').value,
                recipientCity: document.getElementById('recipientCity').value,
                dateLocation: document.getElementById('dateLocation').value,
                subject: document.getElementById('subject').value,
                greeting: document.getElementById('greeting').value,
                closingGreeting: document.getElementById('closingGreeting').value,
                paragraphs: state.paragraphs.map(p => ({ id: p.id, value: document.getElementById(`para_${p.id}`)?.value || '' })),
                attachments: state.attachments.map(a => ({ id: a.id, value: document.getElementById(`att_${a.id}`)?.value || '' }))
            };
        }

        function restoreData(data) {
            const ids = ['senderName', 'senderStreet', 'senderCity', 'senderPhone', 'senderEmail',
                'companyName', 'department', 'recipientStreet', 'recipientCity',
                'dateLocation', 'subject', 'greeting', 'closingGreeting'];

            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el && data[id] !== undefined) el.value = data[id];
            });

            state.paragraphs = Array.isArray(data.paragraphs) ? data.paragraphs : [];
            state.attachments = Array.isArray(data.attachments) ? data.attachments : [];

            if (state.paragraphs.length === 0) addParagraph();
            else renderDynamicLists();

            updatePreview();
        }

        function saveToMemory() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(collectData()));
        }

        function loadAutoSave() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    restoreData(JSON.parse(saved));
                    return true;
                } catch (e) { }
            }
            return false;
        }

        function loadExample() {
            restoreData({
                senderName: "Max Mustermann", senderStreet: "Musterstraße 123", senderCity: "10115 Berlin",
                senderPhone: "030 1234567", senderEmail: "max@example.com",
                companyName: "Tech Corp GmbH", department: "Personalabteilung", recipientStreet: "Innovationsallee 1", recipientCity: "80331 München",
                dateLocation: "Berlin, 15. März 2026", subject: "Bewerbung als Fullstack-Entwickler",
                greeting: "Sehr geehrte Damen und Herren,",
                closingGreeting: "Mit freundlichen Grüßen",
                paragraphs: [
                    { id: "1", value: "Mit großem Interesse habe ich Ihre Stellenausschreibung gelesen." },
                    { id: "2", value: "Wie Sie meinem Lebenslauf entnehmen können, verfüge ich über umfassende Erfahrung im Bereich Web-Applikationen und Architektur." }
                ],
                attachments: [{ id: "1", value: "Lebenslauf" }, { id: "2", value: "Zeugnisse" }]
            });
            showToast("Beispiel geladen");
        }

        function clearAll() {
            if (confirm("Alle Eingaben löschen?")) {
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('letterForm').reset();
                state.paragraphs = [];
                state.attachments = [];
                addParagraph();
                updatePreview();
                showToast("Formular zurückgesetzt");
            }
        }

        function saveToFile() {
            const data = collectData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `brief_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            showToast("Datei gespeichert");
        }

        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    restoreData(JSON.parse(e.target.result));
                    showToast("Dokument geladen");
                } catch (err) {
                    alert("Fehlerhafte Datei.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // reset input
        }

        let toastTimeout;
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
